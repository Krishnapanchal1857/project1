<style>
:root{--sf:#FF6B00;--sf2:#FF8C35;--sfp:#FFF3EB;--nv:#0B1F3A;--nvm:#162E52;--cr:#FDFAF5;--g1:#F5F5F5;--g2:#E8E8E8;--g4:#9A9A9A;--g6:#555;--shad:0 4px 20px rgba(11,31,58,.1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Hind',sans-serif;background:var(--cr);color:var(--nv);min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(11,31,58,.97);backdrop-filter:blur(14px);height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:2.5px solid var(--sf)}
.logo{font-family:'Baloo 2',cursive;font-size:1.7rem;font-weight:800;color:#fff;letter-spacing:2px;text-decoration:none}.logo span{color:var(--sf)}
.navl{display:flex;gap:3px;align-items:center}
.nb{background:none;border:none;color:rgba(255,255,255,.72);font-family:'Hind',sans-serif;font-size:.84rem;font-weight:500;padding:7px 12px;cursor:pointer;border-radius:7px;transition:all .18s;text-decoration:none;display:inline-flex;align-items:center}
.nb:hover,.nb.on{color:#fff;background:rgba(255,107,0,.18)}.nb.pri{background:var(--sf)!important;color:#fff!important;font-weight:700}
.nav-av{width:32px;height:32px;border-radius:50%;background:var(--sf);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-family:'Baloo 2',cursive;font-size:.9rem}
.lo{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-size:.75rem;padding:4px 11px;border-radius:18px;cursor:pointer;font-family:'Hind',sans-serif;transition:all .18s}
.lo:hover{background:rgba(255,107,0,.3);color:#fff}
.band{background:linear-gradient(135deg,var(--nv) 0%,var(--nvm) 100%);padding:30px 44px;margin-top:66px}
.band h1{font-family:'Baloo 2',cursive;font-size:1.85rem;font-weight:800;color:#fff;margin-bottom:4px}
.band p{color:rgba(255,255,255,.4);font-size:.88rem}
.layout{display:flex;min-height:calc(100vh - 66px - 92px)}
.sb{width:232px;flex-shrink:0;background:#fff;border-right:2px solid var(--g2);position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto}
.sb-hd{padding:13px 16px 7px;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--g4);font-weight:700;border-bottom:1px solid var(--g1)}
.db{width:100%;text-align:left;padding:10px 15px;border:none;background:none;font-family:'Hind',sans-serif;font-size:.85rem;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:9px;color:var(--g6);border-left:3px solid transparent;line-height:1.3}
.db:hover{background:var(--sfp);color:var(--sf)}.db.on{background:var(--sfp);color:var(--sf);border-left-color:var(--sf);font-weight:700}
.main{flex:1;padding:24px 32px;overflow-y:auto;min-width:0}
.sr{display:flex;align-items:center;gap:9px;background:#fff;border:2px solid var(--g2);border-radius:10px;padding:9px 14px;margin-bottom:16px;transition:border-color .18s}
.sr:focus-within{border-color:var(--sf)}
.sr input{flex:1;border:none;outline:none;font-family:'Hind',sans-serif;font-size:.9rem;background:none}
.tabs{display:flex;gap:3px;background:var(--g1);border-radius:11px;padding:3px;margin-bottom:22px;flex-wrap:wrap}
.tab{flex:1;min-width:68px;padding:8px 5px;border:none;background:none;font-family:'Hind',sans-serif;font-size:.77rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all .18s;color:var(--g6);text-align:center;white-space:nowrap}
.tab.on{background:#fff;color:var(--sf);box-shadow:0 2px 8px rgba(0,0,0,.09)}
.dh{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid var(--g2);border-radius:13px;padding:18px 22px;margin-bottom:22px}
.dh-ic{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.dh-tt{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:var(--nv)}
.dh-su{font-size:.8rem;color:var(--g4);margin-top:2px}
.sblock{margin-bottom:26px}
.shd{display:flex;align-items:center;gap:9px;background:var(--nv);border-radius:9px;padding:10px 15px;margin-bottom:12px}
.sttl{font-family:'Baloo 2',cursive;font-size:.94rem;font-weight:700;color:#fff}
.sct{font-size:.71rem;color:rgba(255,255,255,.4);margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
.rc{background:#fff;border-radius:12px;padding:14px;border:1.5px solid var(--g2);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:9px}
.rc:hover{border-color:var(--sf);box-shadow:0 5px 22px rgba(255,107,0,.12);transform:translateY(-2px)}
.rc-top{display:flex;align-items:flex-start;gap:9px}
.rc-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.rc-nm{font-weight:700;font-size:.86rem;color:var(--nv);line-height:1.32}
.rc-au{font-size:.71rem;color:var(--g4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtag{display:inline-flex;font-size:.68rem;padding:2px 9px;border-radius:18px;font-weight:700}
.rc-acts{display:flex;gap:6px}
.rcb{flex:1;padding:7px 5px;border-radius:7px;font-size:.74rem;font-weight:700;border:1.5px solid var(--g2);background:var(--cr);color:var(--nv);cursor:pointer;transition:all .18s;font-family:'Hind',sans-serif;text-align:center}
.rcb.dl:hover{background:var(--sf);color:#fff;border-color:var(--sf)}
.rcb.vw:hover{background:var(--nv);color:#fff;border-color:var(--nv)}
/* Formula styles */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.fcard{background:#fff;border-radius:12px;padding:16px;border:1.5px solid var(--g2);transition:all .2s}
.fcard:hover{border-color:var(--sf);box-shadow:0 4px 18px rgba(255,107,0,.1)}
.fcard-hd{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:var(--nv);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.formula{background:var(--g1);border-left:3px solid var(--sf);border-radius:0 7px 7px 0;padding:7px 10px;margin-bottom:7px;font-family:monospace;font-size:.82rem;color:var(--nv);line-height:1.5}
.formula .fn{font-weight:700;color:var(--sf)}
.formula .fd{color:var(--g6);font-size:.75rem;display:block;margin-top:2px}
.empty{text-align:center;padding:60px 20px;color:var(--g4)}
.empty .ei{font-size:3rem;margin-bottom:12px}
/* Viewer overlay */
.vov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.vov.open{display:flex}
.vbox{background:#fff;border-radius:18px;width:100%;max-width:820px;min-height:200px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:pop .28s cubic-bezier(.34,1.56,.64,1) both;margin:auto}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.vhd{padding:18px 24px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:18px 18px 0 0}
.vttl{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;color:var(--nv)}
.vbody{padding:24px}
.mx{width:30px;height:30px;border-radius:50%;background:var(--g1);border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.mx:hover{background:var(--g2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ib{background:var(--cr);border-radius:9px;padding:12px}
.il{font-size:.63rem;color:var(--g4);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px}
.iv{font-weight:700;font-size:.87rem;color:var(--nv)}
.book-list{background:#F3EEFF;border-radius:10px;padding:14px;margin-bottom:14px}
.book-list h4{font-size:.74rem;font-weight:700;color:#7C3AED;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.book-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed #E9D8FD;font-size:.83rem;color:var(--nv)}
.book-item:last-child{border-bottom:none}
.access-box{background:#FFF3E8;border-radius:10px;padding:15px;border:1.5px dashed rgba(255,107,0,.3)}
.access-box h4{font-weight:700;color:var(--sf);margin-bottom:8px;font-size:.95rem}
.access-box p{font-size:.82rem;color:var(--g6);margin-bottom:12px}
.abtn{padding:9px 20px;border-radius:8px;font-family:'Hind',sans-serif;font-weight:700;cursor:pointer;font-size:.82rem;border:none;transition:all .18s}
.abtn.dl{background:var(--sf);color:#fff}.abtn.dl:hover{background:var(--sf2)}
.abtn.vw{background:var(--nv);color:#fff;margin-left:8px}.abtn.vw:hover{background:#0d2a4a}
.pyq-box{background:#EBF3FF;border-radius:10px;padding:13px;font-size:.83rem;color:#1E40AF;margin-bottom:14px}
.formula-viewer{background:var(--g1);border-radius:10px;padding:14px}
.fv-item{background:#fff;border-left:3px solid var(--sf);border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:8px}
.fv-nm{font-weight:700;font-size:.85rem;color:var(--nv);margin-bottom:2px}
.fv-eq{font-family:monospace;font-size:.88rem;color:#7C3AED;font-weight:700}
.fv-desc{font-size:.75rem;color:var(--g6);margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--nv);color:#fff;padding:11px 17px;border-radius:11px;font-size:.85rem;font-weight:500;box-shadow:0 7px 26px rgba(0,0,0,.26);transform:translateY(65px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);border-left:4px solid var(--sf);max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
footer{background:var(--nv);color:rgba(255,255,255,.38);padding:22px 44px;font-size:.82rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
footer span{color:var(--sf);font-weight:700}footer a{color:rgba(255,255,255,.38);text-decoration:none}footer a:hover{color:var(--sf)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--sf)}
@media(max-width:820px){
  .layout{flex-direction:column}.sb{width:100%;height:auto;position:relative;top:0;display:flex;overflow-x:auto;border-right:none;border-bottom:2px solid var(--g2);padding:5px 0}
  .sb-hd{display:none}.db{white-space:nowrap;border-left:none!important;border-bottom:3px solid transparent;flex-shrink:0;padding:9px 12px}.db.on{border-bottom-color:var(--sf)!important;border-left:none!important}
  .main{padding:16px}.band{padding:24px 16px}.info-grid{grid-template-columns:1fr}.vbox{max-height:95vh}
}
</style>
</head>

function render(){
  var dInfo=DEPTS.find(function(d){return d.id===dept;})||DEPTS[0];
  var sems=SEMS[dept]||{};
  var out=document.getElementById('out');

  // dept hero
  var semCount=Object.keys(sems).length;
  var subCount=Object.values(sems).reduce(function(a,v){return a+v.length;},0);
  var html='<div class="dh"><div class="dh-ic" style="background:'+dInfo.bg+'">'+dInfo.icon+'</div>'+
    '<div><div class="dh-tt">'+dInfo.label+'</div><div class="dh-su">'+semCount+' Semesters/Streams  •  '+subCount+' Subjects  •  Textbooks, Notes, PYQ, Formulas & More</div></div></div>';

  if(tab==='formula'){
    html+=renderFormulas(dInfo,sems);
    out.innerHTML=html;return;
  }

  var types=tab==='all'?['textbook','reference','notes','practice','pyq']:[tab];
  var any=false;

  Object.keys(sems).forEach(function(sem){
    var subs=sems[sem];
    var filtered=sq?subs.filter(function(s){return s.toLowerCase().indexOf(sq)>=0;}):subs;
    if(!filtered.length)return;
    types.forEach(function(type){
      var m=TM[type];
      var cards=filtered.map(function(sub){return makeCard(sub,type,dInfo);}).join('');
      any=true;
      html+='<div class="sblock"><div class="shd"><span>'+m.icon+'</span><span class="sttl">'+sem+' — '+m.lbl+'s</span><span class="sct">'+filtered.length+' resources</span></div><div class="grid">'+cards+'</div></div>';
    });
  });

  if(!any)html+='<div class="empty"><div class="ei">🔍</div><div style="font-size:1rem;font-weight:700;color:var(--nv);margin-bottom:6px">No results for "'+sq+'"</div><div style="font-size:.84rem">Try different keywords or switch department</div></div>';
  out.innerHTML=html;
}

function makeCard(sub,type,dInfo){
  var m=TM[type];
  var au=type==='textbook'?'University Prescribed Textbook':type==='reference'?(REFS[sub]?REFS[sub][0]:'Standard Reference Book'):type==='notes'?'SAKSHAR Community Notes — PDF/IMG':type==='practice'?'SAKSHAR — 50+ MCQ + Short + Long Q':PYQ[dept]||'University Board Papers';
  var ss=sub.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  return '<div class="rc">'+
    '<div class="rc-top"><div class="rc-ic" style="background:'+m.ibg+'">'+m.icon+'</div>'+
    '<div style="flex:1;min-width:0"><div class="rc-nm">'+sub+'</div><div class="rc-au" title="'+au+'">'+au+'</div></div></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
    '<span class="rtag" style="background:'+m.tbg+';color:'+m.itc+'">'+m.lbl+'</span>'+
    '<span style="font-size:.67rem;color:var(--g4)">'+(type==='pyq'?'2015–2024':type==='practice'?'With Ans Key':type==='notes'?'PDF/IMG':'PDF')+'</span></div>'+
    '<div class="rc-acts">'+
    '<button class="rcb dl" onclick="event.stopPropagation();dlTap(\''+ss+'\')">⬇ Download</button>'+
    '<button class="rcb vw" onclick="event.stopPropagation();openViewer(\''+ss+'\',\''+type+'\')">👁 View</button>'+
    '</div></div>';
}

function renderFormulas(dInfo,sems){
  var allSubs=[];
  Object.values(sems).forEach(function(s){allSubs=allSubs.concat(s);});
  var filtered=sq?allSubs.filter(function(s){return s.toLowerCase().indexOf(sq)>=0;}):allSubs;

  var withFormulas=filtered.filter(function(s){return FORMULAS[s]&&FORMULAS[s].length;});
  var withoutFormulas=filtered.filter(function(s){return !FORMULAS[s]||!FORMULAS[s].length;});

  if(!filtered.length)return'<div class="empty"><div class="ei">🔍</div><p>No subjects match "'+sq+'"</p></div>';

  var html='<div style="background:#FFF0F7;border-radius:11px;padding:14px 18px;margin-bottom:20px;border:1.5px solid #FCE7F3">'+
    '<div style="font-family:\'Baloo 2\',cursive;font-size:1rem;font-weight:700;color:#DB2777;margin-bottom:4px">🧮 Formula Bank — '+dInfo.label+'</div>'+
    '<div style="font-size:.82rem;color:#9D174D">Click any card to expand. Use formulas during study & revision. '+withFormulas.length+' subjects with formulas available.</div></div>';

  if(withFormulas.length){
    html+='<div class="fgrid">';
    withFormulas.forEach(function(sub){
      var fms=FORMULAS[sub];
      html+='<div class="fcard"><div class="fcard-hd">🧪 '+sub+'<span style="margin-left:auto;font-size:.68rem;background:#FFF0F7;color:#DB2777;padding:2px 8px;border-radius:10px;font-weight:700">'+fms.length+' formulas</span></div>';
      fms.forEach(function(f){
        html+='<div class="formula"><span class="fn">'+f.name+':</span> '+f.eq+'<span class="fd">'+f.desc+'</span></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  }

  if(withoutFormulas.length){
    html+='<div style="margin-top:22px;background:var(--g1);border-radius:10px;padding:14px 18px">'+
      '<div style="font-size:.74rem;font-weight:700;color:var(--g4);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">More Subjects (Formulas Coming Soon)</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:7px">';
    withoutFormulas.forEach(function(s){html+='<span style="background:#fff;border:1.5px solid var(--g2);border-radius:7px;padding:5px 11px;font-size:.8rem;color:var(--g6)">'+s+'</span>';});
    html+='</div></div>';
  }
  return html;
}

// ═══════════════════════ VIEWER ═══════════════════════
function openViewer(sub,type){
  var dInfo=DEPTS.find(function(d){return d.id===dept;})||DEPTS[0];
  var m=TM[type];
  var refs=REFS[sub]||[];
  var fms=FORMULAS[sub]||[];

  document.getElementById('vttl').innerHTML=m.icon+' '+sub;

  var body=
    '<div class="info-grid">'+
    '<div class="ib"><div class="il">Department</div><div class="iv">'+dInfo.icon+' '+dInfo.label+'</div></div>'+
    '<div class="ib"><div class="il">Resource Type</div><div class="iv">'+m.icon+' '+m.lbl+'</div></div>'+
    '<div class="ib"><div class="il">Subject</div><div class="iv">'+sub+'</div></div>'+
    '<div class="ib"><div class="il">Availability</div><div class="iv" style="color:#059669">✅ Available</div></div>'+
    '</div>';

  if(type==='reference'&&refs.length){
    body+='<div class="book-list"><h4>📚 Recommended Reference Books</h4>';
    refs.forEach(function(r,i){body+='<div class="book-item"><span style="background:var(--sf);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;flex-shrink:0">'+(i+1)+'</span>'+r+'</div>';});
    body+='</div>';
  }

  if(type==='textbook'){
    body+='<div style="background:#EBF3FF;border-radius:10px;padding:13px;margin-bottom:14px">'+
      '<div style="font-weight:700;color:#1E40AF;margin-bottom:7px;font-size:.87rem">📖 About This Textbook</div>'+
      '<p style="font-size:.83rem;color:#1E3A8A;line-height:1.6">This is the university-prescribed textbook for <strong>'+sub+'</strong>. It covers the complete syllabus as per the latest curriculum. PDF edition includes all chapters, exercises, and solved examples.</p>'+
      '</div>';
  }

  if(type==='pyq'){
    body+='<div class="pyq-box"><strong>🗂️ PYQ Source Board:</strong><br>'+PYQ[dept]+'<br><br>'+
      '<strong>What\'s Included:</strong> 10 years of board exam papers with solutions. Repeated important questions highlighted. Trend analysis by topic.</div>';
  }

  if(type==='notes'){
    body+='<div style="background:#EDFAF2;border-radius:10px;padding:13px;margin-bottom:14px">'+
      '<div style="font-weight:700;color:#065F46;margin-bottom:6px;font-size:.87rem">✏️ Community Notes Info</div>'+
      '<p style="font-size:.83rem;color:#064E3B;line-height:1.6">Notes for <strong>'+sub+'</strong> are contributed by SAKSHAR students. Includes: chapter summaries, important definitions, key derivations, and exam-relevant points.</p>'+
      '<a href="notes.html" style="display:inline-block;margin-top:10px;background:#059669;color:#fff;padding:7px 14px;border-radius:7px;font-size:.8rem;font-weight:700;text-decoration:none">📤 Share Your Notes</a>'+
      '</div>';
  }

  if(type==='practice'){
    body+='<div style="background:#F3EEFF;border-radius:10px;padding:13px;margin-bottom:14px">'+
      '<div style="font-weight:700;color:#7C3AED;margin-bottom:6px;font-size:.87rem">📝 Practice Paper Details</div>'+
      '<ul style="font-size:.83rem;color:#4C1D95;line-height:1.9;padding-left:18px">'+
      '<li>50+ Questions: MCQ + Short Answer + Long Answer</li>'+
      '<li>Complete Answer Key Provided</li>'+
      '<li>Difficulty: Easy → Medium → Hard progression</li>'+
      '<li>Topics: As per latest university exam pattern</li>'+
      '</ul></div>';
  }

  if(fms.length){
    body+='<div class="formula-viewer" style="margin-bottom:14px">'+
      '<div style="font-size:.74rem;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">🧮 Key Formulas for '+sub+'</div>';
    fms.forEach(function(f){
      body+='<div class="fv-item"><div class="fv-nm">'+f.name+'</div><div class="fv-eq">'+f.eq+'</div><div class="fv-desc">'+f.desc+'</div></div>';
    });
    body+='</div>';
  }

  body+='<div class="access-box">'+
    '<h4>📥 Access This Resource</h4>'+
    '<p>Connect a backend server (Node.js + MongoDB) to serve real PDF files. In this demo, download & view are simulated.</p>'+
    '<button class="abtn dl" onclick="dlTap(\''+sub.replace(/'/g,'').substring(0,30)+'\');closeV()">⬇ Download PDF</button>'+
    '<button class="abtn vw" onclick="toast(\'👁 Opening viewer...\');closeV()">🔗 Open in New Tab</button>'+
    '</div>';

  document.getElementById('vbody').innerHTML=body;
  document.getElementById('vov').classList.add('open');
}

function closeV(){document.getElementById('vov').classList.remove('open');}
function dlTap(s){toast('📥 Download started: '+s.substring(0,38));}

var _tt;
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2800);
}

// ═══════════════════════ INIT ═══════════════════════
buildSB();
render();
</script>
</body>
</html>
